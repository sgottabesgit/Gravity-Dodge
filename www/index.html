<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Gravity Dodge</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body onload="init()">
    <h1>Gravity Dodge</h1>
    <canvas id="gameCanvas" width="300" height="500"></canvas>
    <div id="score">Score: 0</div>
    <div id="highScore">High Score: 0</div>
    <div class="controls">
        <div class="slider-container">
            <span class="slider-label">Ball Speed:</span>
            <input type="range" id="ballSpeedSlider" min="0.1" max="5.0" step="0.1" value="1.5">
        </div>
        <div class="slider-container">
            <span class="slider-label">Obstacle Speed:</span>
            <input type="range" id="obstacleSpeedSlider" min="1" max="10" step="0.1" value="2">
        </div>
        <div id="pointsPerSecond">Points per Second: 0.00</div>
        <button id="startButton" onclick="startGame()">Start Game</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
