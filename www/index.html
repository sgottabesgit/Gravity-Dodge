<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Gravity Dodge</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
            color: #fff;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 36px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        canvas {
            background: #333;
            display: block;
            margin: 0 auto;
            border: 2px solid #555;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        #score,
        #highScore,
        #pointsPerSecond {
            font-size: 24px;
            margin-top: 10px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .controls {
            margin-top: 10px;
        }

        .slider-container {
            margin: 10px;
        }

        .slider-label {
            display: inline-block;
            width: 150px;
            text-align: left;
        }

        input[type="range"] {
            width: 200px;
        }

        #startButton {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background: #0af;
            border: none;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s;
        }

        #startButton:hover {
            background: #08c;
        }

        #startButton:disabled {
            background: #555;
            cursor: not-allowed;
        }
    </style>
    <script>
        'use strict';
        const REFRESH_RATE = 1000 / 25; // 25 fps
        const GRAVITY = 9.8;
        const FACTOR_FRICTION = 0.6;
        const BALL_RADIUS = 15;
        const OBSTACLE_WIDTH = 30;
        const OBSTACLE_HEIGHT = 30;

        let x, y, z;
        let ballX, ballY;
        let canvas, context;
        let obstacles = [];
        let score = 0;
        let highScore = 0;
        let gameInterval;
        let obstacleInterval;
        let ballSpeed = 1.5; // Initial ball speed
        let obstacleSpeed = 2; // Initial obstacle speed

        function init() {
            canvas = document.getElementById('gameCanvas');
            context = canvas.getContext('2d');
            ballX = canvas.width / 2;
            ballY = canvas.height - BALL_RADIUS - 10;
            window.addEventListener('devicemotion', getValues, true);
            document.getElementById('ballSpeedSlider').addEventListener('input', updateBallSpeed);
            document.getElementById('obstacleSpeedSlider').addEventListener('input', updateObstacleSpeed);

            // Load high score from local storage
            if (localStorage.getItem('highScore')) {
                highScore = parseFloat(localStorage.getItem('highScore'));
                document.getElementById('highScore').innerText = "High Score: " + Math.round(highScore);
            }
            updatePointsPerSecond();
        }

        function getValues(event) {
            x = event.accelerationIncludingGravity.x;
            y = event.accelerationIncludingGravity.y;
            z = event.accelerationIncludingGravity.z;
        }

        function startGame() {
            document.getElementById('startButton').disabled = true;
            document.getElementById('ballSpeedSlider').disabled = true;
            document.getElementById('obstacleSpeedSlider').disabled = true;
            score = 0;
            obstacles = [];
            gameInterval = setInterval(updateGame, REFRESH_RATE);
            obstacleInterval = setInterval(addObstacle, 1000); // Add a new obstacle every second
        }

        function updateGame() {
            if (typeof x === 'undefined' || typeof y === 'undefined' || typeof z === 'undefined') {
                return;
            }

            let f = 1 - FACTOR_FRICTION * Math.abs(z) / GRAVITY;
            let ax = x * f;
            let ay = y * f;

            ballX -= ax * ballSpeed;
            ballY += ay * ballSpeed;

            if (ballX < BALL_RADIUS) ballX = BALL_RADIUS;
            if (ballX > canvas.width - BALL_RADIUS) ballX = canvas.width - BALL_RADIUS;
            if (ballY < BALL_RADIUS) ballY = BALL_RADIUS;
            if (ballY > canvas.height - BALL_RADIUS) ballY = canvas.height - BALL_RADIUS;

            context.clearRect(0, 0, canvas.width, canvas.height);
            drawBall(ballX, ballY, BALL_RADIUS);
            drawObstacles();
            checkCollisions();
            updateScore();
        }

        function drawBall(bx, by, r) {
            context.beginPath();
            context.arc(bx, by, r, 0, Math.PI * 2, false);
            context.fillStyle = '#0af';
            context.fill();
            context.closePath();
        }

        function addObstacle() {
            let obstacleX = Math.random() * (canvas.width - OBSTACLE_WIDTH);
            obstacles.push({ x: obstacleX, y: -OBSTACLE_HEIGHT });
        }

        function drawObstacles() {
            context.fillStyle = '#f00';
            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.y += obstacleSpeed;
                context.fillRect(obs.x, obs.y, OBSTACLE_WIDTH, OBSTACLE_HEIGHT);
            }
            obstacles = obstacles.filter(obs => obs.y < canvas.height);
        }

        function checkCollisions() {
            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                if (ballX + BALL_RADIUS > obs.x && ballX - BALL_RADIUS < obs.x + OBSTACLE_WIDTH &&
                    ballY + BALL_RADIUS > obs.y && ballY - BALL_RADIUS < obs.y + OBSTACLE_HEIGHT) {
                    gameOver();
                    break;
                }
            }
        }

        function updateScore() {
            score += (10 / ballSpeed) + obstacleSpeed; // Score calculation based on speeds
            document.getElementById('score').innerText = "Score: " + Math.round(score);

            // Update high score if the current score is higher
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('highScore', highScore);
                document.getElementById('highScore').innerText = "High Score: " + Math.round(highScore);
            }
        }

        function gameOver() {
            clearInterval(gameInterval);
            clearInterval(obstacleInterval);
            alert('Game Over! Your score: ' + Math.round(score));
            document.getElementById('startButton').disabled = false;
            document.getElementById('ballSpeedSlider').disabled = false;
            document.getElementById('obstacleSpeedSlider').disabled = false;
        }

        function updateBallSpeed(event) {
            ballSpeed = parseFloat(event.target.value);
            updatePointsPerSecond();
        }

        function updateObstacleSpeed(event) {
            obstacleSpeed = parseFloat(event.target.value);
            updatePointsPerSecond();
        }

        function updatePointsPerSecond() {
            let pointsPerSecond = (10 / ballSpeed) + obstacleSpeed;
            document.getElementById('pointsPerSecond').innerText = "Points per Second: " + pointsPerSecond.toFixed(2);
        }

    </script>
</head>

<body onload="init()">
    <h1>Gravity Dodge</h1>
    <canvas id="gameCanvas" width="300" height="500"></canvas>
    <div id="score">Score: 0</div>
    <div id="highScore">High Score: 0</div>
    <div id="pointsPerSecond">Points per Second: 0.00</div>
    <div class="controls">
        <div class="slider-container">
            <span class="slider-label">Ball Speed:</span>
            <input type="range" id="ballSpeedSlider" min="0.1" max="5.0" step="0.1" value="1.5">
        </div>
        <div class="slider-container">
            <span class="slider-label">Obstacle Speed:</span>
            <input type="range" id="obstacleSpeedSlider" min="1" max="10" step="0.1" value="2">
        </div>
        <button id="startButton" onclick="startGame()">Start Game</button>
    </div>
</body>

</html>
