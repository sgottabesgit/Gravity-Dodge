<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Catch the Ball Game</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f0f0f0;
        }

        canvas {
            border: 2px solid #777;
            background: #bbb;
        }
    </style>
    <script>
        'use strict';
        const REFRESH_RATE = 1000 / 25; // 25 fps
        const GRAVITY = 0.5; // Acceleration due to gravity for the ball
        const PADDLE_WIDTH = 100;
        const PADDLE_HEIGHT = 20;
        const BALL_RADIUS = 15;

        let ballX, ballY, ballVY;
        let paddleX;
        let canvasWidth, canvasHeight;
        let context = null;
        let score = 0;
        let gameOver = false;

        function init() {
            initCanvas();
            resetBall();
            addEventListener('devicemotion', getPaddlePosition, true);
            setInterval(updateGame, REFRESH_RATE);
        }

        function initCanvas() {
            let canvas = document.getElementById('canvas1');
            context = canvas.getContext('2d');
            canvasWidth = canvas.width = window.innerWidth * 0.9;
            canvasHeight = canvas.height = window.innerHeight * 0.7;
            paddleX = (canvasWidth - PADDLE_WIDTH) / 2;
        }

        function resetBall() {
            ballX = Math.random() * (canvasWidth - 2 * BALL_RADIUS) + BALL_RADIUS;
            ballY = BALL_RADIUS;
            ballVY = 2;
        }

        function getPaddlePosition(event) {
            let tilt = event.accelerationIncludingGravity.x;
            paddleX -= tilt * 5; // Adjust sensitivity as needed
            if (paddleX < 0) paddleX = 0;
            if (paddleX + PADDLE_WIDTH > canvasWidth) paddleX = canvasWidth - PADDLE_WIDTH;
        }

        function updateGame() {
            if (gameOver) return;

            ballY += ballVY;
            ballVY += GRAVITY;

            if (ballY + BALL_RADIUS > canvasHeight) {
                if (ballX > paddleX && ballX < paddleX + PADDLE_WIDTH) {
                    score++;
                    resetBall();
                } else {
                    gameOver = true;
                    alert("Game Over! Your score: " + score);
                    location.reload(); // Reload the page to restart the game
                }
            }

            drawGame();
        }

        function drawGame() {
            context.clearRect(0, 0, canvasWidth, canvasHeight);

            // Draw ball
            context.beginPath();
            context.arc(ballX, ballY, BALL_RADIUS, 0, Math.PI * 2, false);
            context.fillStyle = "#f00";
            context.fill();
            context.closePath();

            // Draw paddle
            context.fillStyle = "#00f";
            context.fillRect(paddleX, canvasHeight - PADDLE_HEIGHT, PADDLE_WIDTH, PADDLE_HEIGHT);

            // Draw score
            context.font = "20px Arial";
            context.fillStyle = "#000";
            context.fillText("Score: " + score, 10, 20);
        }

    </script>
</head>

<body onload="init()">
    <canvas id="canvas1"></canvas>
</body>

</html>
